<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProxiCap+ Dashboard</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    defer
  ></script>

  <style>
    :root{
      --bg: #0f1117;
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --muted2: rgba(255,255,255,0.45);

      --ok: #00ff15;
      --bad: #ff3300;
      --accent: #00ccff;

      --shadow: 0 12px 30px rgba(0,0,0,0.40);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container{
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 28px 0 60px;
    }

    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .card-header{
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title{
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-body{
      padding: 18px;
    }

    .pill{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      font-weight: 700;
      letter-spacing: 0.02em;
      user-select: none;
    }

    .pill.ok{
      border-color: rgba(0,255,21,0.35);
      box-shadow: 0 0 18px rgba(0,255,21,0.12);
    }

    .pill.bad{
      border-color: rgba(255,51,0,0.35);
      box-shadow: 0 0 18px rgba(255,51,0,0.12);
    }

    .pill.neutral{
      border-color: rgba(0,204,255,0.25);
      box-shadow: 0 0 18px rgba(0,204,255,0.10);
    }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #app{
      display: block;
    }

    header{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 180px;
      padding: 0;
    }

    .brand{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-row{
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .brand-text{
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand h1{
      margin: 0;
      font-size: clamp(48px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1.05;
    }

    .brand p{
      margin: 10px 0 0;
      font-size: clamp(20px, 2.5vw, 30px);
      color: var(--muted);
      line-height: 1.4;
      white-space: nowrap;
    }

    .divider{
      height: 1px;
      background: rgba(255,255,255,0.10);
      margin: 26px 0;
    }

    .grid{
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 16px;
    }

    @media (max-width: 768px){
      .grid{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 650px){
      .brand-row{
        flex-direction: column;
      }
    }

    .map-box{
      border-radius: 16px;
      border: 1px dashed rgba(0,204,255,0.30);
      background: rgba(0,204,255,0.06);
      min-height: 260px;
      display: block;
      overflow: hidden;
    }

    #map{
      width: 100%;
      min-height: 260px;
    }

    .leaflet-control-zoom a{
      background: rgba(15,17,23,0.85);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .leaflet-control-zoom a:hover{
      background: rgba(15,17,23,0.95);
    }

    .coords{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .coord{
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }

    .coord .label{
      font-size: 12px;
      color: var(--muted2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .coord .value{
      font-size: 18px;
      font-weight: 800;
    }

    .stack{
      display: grid;
      gap: 16px;
    }

    .big-status{
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .value-block{
      font-size: 15px;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="container">
      <div class="card">

        <header>
          <div class="brand">
            <div class="brand-row">
              <div class="brand-text">
                <h1>ProxiCap+</h1>
                <p>Live Caretaker Monitoring Page</p>
              </div>
            </div>
          </div>
        </header>

        <div class="divider"></div>

        <div id="dashboard" class="container" style="padding-top: 0;">
          <div class="grid">

            <div class="card">
              <div class="card-header">
                <div class="card-title">Geolocation</div>
                <span class="pill neutral mono">MAP</span>
              </div>
              <div class="card-body">
                <div class="map-box">
                  <div id="map" aria-label="Map"></div>
                </div>

                <div class="coords">
                  <div class="coord">
                    <div class="label">Latitude</div>
                    <div class="value mono" id="latVal">—</div>
                  </div>
                  <div class="coord">
                    <div class="label">Longitude</div>
                    <div class="value mono" id="lonVal">—</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="stack">

              <div class="card">
                <div class="card-header">
                  <div class="card-title">Status</div>
                  <span id="statusPill" class="pill neutral">
                    <span>●</span> <span id="statusShort">Waiting…</span>
                  </span>
                </div>
                <div class="card-body">
                  <div class="big-status" id="statusText">Waiting for status…</div>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <div class="card-title">Last Fall Detected</div>
                  <span class="pill neutral mono">H:M:S</span>
                </div>
                <div class="card-body">
                  <div class="value-block mono" id="timeText">Waiting for time…</div>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const ENDPOINT = "https://funny-kelpie-034c79.netlify.app/.netlify/functions/update";
    const POLL_MS = 3000;

    const latVal = document.getElementById("latVal");
    const lonVal = document.getElementById("lonVal");
    const statusText = document.getElementById("statusText");
    const statusShort = document.getElementById("statusShort");
    const statusPill = document.getElementById("statusPill");
    const timeText = document.getElementById("timeText");

    let map = null;
    let marker = null;

    function initMap() {
      const defaultLat = 53.5444;
      const defaultLon = -113.4909;

      map = L.map("map", {
        zoomControl: true,
        attributionControl: true
      }).setView([defaultLat, defaultLon], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      marker = L.marker([defaultLat, defaultLon]).addTo(map);
      marker.bindPopup("ProxiCap+ location").openPopup();
    }

    function updateMap(lat, lon, popupText) {
      if (!map || !marker) return;

      const latNum = Number(lat);
      const lonNum = Number(lon);

      if (!Number.isFinite(latNum) || !Number.isFinite(lonNum)) return;

      const newPos = [latNum, lonNum];
      marker.setLatLng(newPos);

      if (popupText) marker.setPopupContent(popupText);

      map.setView(newPos, map.getZoom(), { animate: true });
    }

    function looksLikeFall(statusStr){
      const s = String(statusStr || "").toLowerCase();
      return s.includes("fall") || s.includes("detected") || s.includes("alert") || s.includes("emergency");
    }

    function setStatusUI(statusStr){
      const fall = looksLikeFall(statusStr);
      statusPill.classList.remove("ok", "bad", "neutral");

      if (!statusStr || statusStr === "Waiting…") {
        statusPill.classList.add("neutral");
        statusShort.textContent = "Waiting…";
        statusText.textContent = "Waiting for status…";
        return;
      }

      if (fall){
        statusPill.classList.add("bad");
        statusShort.textContent = "FALL";
        statusText.textContent = String(statusStr);
      } else {
        statusPill.classList.add("ok");
        statusShort.textContent = "OK";
        statusText.textContent = String(statusStr);
      }
    }

    function setPlaceholdersWaiting(){
      latVal.textContent = "—";
      lonVal.textContent = "—";
      timeText.textContent = "Waiting for time…";
      setStatusUI("Waiting…");
    }

    async function fetchData(){
      try{
        const res = await fetch(ENDPOINT);
        const data = await res.json();

        if (!data || Object.keys(data).length === 0){
          setPlaceholdersWaiting();
          return;
        }

        latVal.textContent = (data.lat ?? "—");
        lonVal.textContent = (data.lon ?? "—");
        timeText.textContent = (data.lastFallTime ?? "—");
        setStatusUI(data.status ?? "—");

        const popup = `ProxiCap+<br>${data.lastFallTime ?? ""}<br>(${data.lat ?? "—"}, ${data.lon ?? "—"})`;

        updateMap(data.lat, data.lon, popup);

      } catch(err){
        setPlaceholdersWaiting();
      }
    }

    setInterval(fetchData, POLL_MS);
    fetchData();

    window.addEventListener("load", () => {
      if (window.L) {
        initMap();
        if (map) map.invalidateSize();
      }
    });
  </script>
</body>
</html>
