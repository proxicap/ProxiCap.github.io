<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProxiCap+ Dashboard</title>

  <!-- Leaflet (Map) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    defer
  ></script>

  <style>
    :root{
      --bg: #0f1117;
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --muted2: rgba(255,255,255,0.45);

      --ok: #00ff15;
      --bad: #ff3300;

      --shadow: 0 12px 30px rgba(0,0,0,0.40);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui;
      background: var(--bg);
      color: var(--text);
    }

    .container{
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 28px 0 60px;
    }

    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header{
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .card-body{
      padding: 18px;
    }

    .mono{
      font-family: monospace;
    }

    header{
      text-align:center;
      padding:40px 18px;
    }

    .brand h1{
      font-size:clamp(48px,6vw,72px);
      margin:0;
    }

    .brand p{
      font-size:clamp(20px,2.5vw,30px);
      color:var(--muted);
      margin:0;
    }

    .grid{
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 16px;
    }

    #map{
      height:260px;
      width:100%;
    }

    .coords{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .coord{
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
    }

    .stack{
      display:grid;
      gap:16px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:white;
    }

    .dot.ok{background:var(--ok);}
    .dot.bad{background:var(--bad);}
  </style>
</head>

<body>

  <div id="app">
    <div class="container">

      <div class="card">
        <div class="card-header">
          <div>
            <span id="netDot" class="dot"></span>
            <span id="netText">Connecting…</span>
          </div>
          <span id="localUpdated">Last updated: —</span>
        </div>

        <header>
          <div class="brand">
            <h1>ProxiCap+</h1>
            <p>Live Caretaker Monitoring Page</p>
          </div>
        </header>

        <div class="grid">

          <div class="card">
            <div class="card-header">Geolocation</div>
            <div class="card-body">
              <div id="map"></div>

              <div class="coords">
                <div class="coord">
                  <div>Latitude</div>
                  <div id="latVal">—</div>
                </div>
                <div class="coord">
                  <div>Longitude</div>
                  <div id="lonVal">—</div>
                </div>
              </div>
            </div>
          </div>

          <div class="stack">

            <div class="card">
              <div class="card-header">Status</div>
              <div class="card-body" id="statusText">Waiting…</div>
            </div>

            <div class="card">
              <div class="card-header">Address</div>
              <div class="card-body" id="addressText">Waiting…</div>
            </div>

            <div class="card">
              <div class="card-header">Time</div>
              <div class="card-body mono" id="timeText">Waiting…</div>
            </div>

          </div>
        </div>

        <div style="padding:16px;">
          <pre id="rawJson">Waiting…</pre>
        </div>

      </div>
    </div>
  </div>

  <script>
    const ENDPOINT = "https://funny-kelpie-034c79.netlify.app/.netlify/functions/update";

    const latVal = document.getElementById("latVal");
    const lonVal = document.getElementById("lonVal");
    const statusText = document.getElementById("statusText");
    const addressText = document.getElementById("addressText");
    const timeText = document.getElementById("timeText");
    const rawJson = document.getElementById("rawJson");

    const netDot = document.getElementById("netDot");
    const netText = document.getElementById("netText");
    const localUpdated = document.getElementById("localUpdated");

    let map = L.map("map").setView([53.5444, -113.4909], 13);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    let marker = L.marker([53.5444, -113.4909]).addTo(map);

    function updateMap(lat, lon){
      if(!lat || !lon) return;
      marker.setLatLng([lat, lon]);
      map.setView([lat, lon], 15);
    }

    async function fetchData(){
      try{
        const res = await fetch(ENDPOINT);
        const data = await res.json();

        if(!data) return;

        latVal.textContent = data.lat ?? "—";
        lonVal.textContent = data.lon ?? "—";
        statusText.textContent = data.status ?? "—";
        addressText.textContent = data.address ?? "—";
        timeText.textContent = data.time ?? "—";

        rawJson.textContent = JSON.stringify(data, null, 2);

        updateMap(data.lat, data.lon);

        netDot.className = "dot ok";
        netText.textContent = "Online";
        localUpdated.textContent = "Last updated: " + new Date().toLocaleString();

      } catch {
        netDot.className = "dot bad";
        netText.textContent = "Error";
      }
    }

    setInterval(fetchData, 3000);
    fetchData();
  </script>

</body>
</html>
