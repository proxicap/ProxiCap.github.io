<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8" />
  <!-- Makes the page scale properly on phones and smaller screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Browser tab title -->
  <title>ProxiCap+ Dashboard</title> 

  <!-- Leaflet CSS for the interactive map -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Leaflet JavaScript for map features -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    defer
  ></script>

  <style>
    /* --------------------------------------------------
       ROOT VARIABLES
       These CSS variables store colors, shadows, radius, etc.
       This makes the theme easier to manage in one place.
    -------------------------------------------------- */
    :root{
      --bg: #0f1117;
      --panel: rgba(255,255,255,0.06);
      --panel-2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --muted2: rgba(255,255,255,0.45);

      --ok: #00ff15;
      --warn: #ffea00;
      --bad: #ff3300;
      --accent: #00ccff;

      --shadow: 0 12px 30px rgba(0,0,0,0.40);
      --radius: 18px;
    }

    /* Makes width/height include padding and border */
    * { box-sizing: border-box; }

    /* Full height layout */
    html, body { height: 100%; }

    /* --------------------------------------------------
       PAGE BODY STYLING
       Creates the dark background and glowing gradient effect
    -------------------------------------------------- */
    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(0,204,255,0.14), transparent 55%),
                  radial-gradient(900px 600px at 80% 20%, rgba(0,255,21,0.10), transparent 60%),
                  var(--bg);
      color: var(--text);
    }

    /* Links inherit page color and have no underline */
    a { color: inherit; text-decoration: none; }

    /* Main outer page width and spacing */
    .container{
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 28px 0 60px;
    }

    /* Standard card look used throughout page */
    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    /* Top section inside a card */
    .card-header{
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    /* Small uppercase heading text for card titles */
    .card-title{
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Main content area inside each card */
    .card-body{
      padding: 18px;
    }

    /* Pill style used for labels/status boxes */
    .pill{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      font-weight: 700;
      letter-spacing: 0.02em;
      user-select: none;
    }

    /* Green pill state */
    .pill.ok{
      border-color: rgba(0,255,21,0.35);
      box-shadow: 0 0 18px rgba(0,255,21,0.12);
    }

    /* Red pill state */
    .pill.bad{
      border-color: rgba(255,51,0,0.35);
      box-shadow: 0 0 18px rgba(255,51,0,0.12);
    }

    /* Neutral blue pill state */
    .pill.neutral{
      border-color: rgba(0,204,255,0.25);
      box-shadow: 0 0 18px rgba(0,204,255,0.10);
    }

    /* Monospace font for things like coordinates/time/raw JSON */
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* Main app wrapper */
    #app{
      display: block;
    }

    /* --------------------------------------------------
       HEADER / BRAND AREA
       Holds title, subtitle, and radar loaders
    -------------------------------------------------- */
    header{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:40px 18px;
      text-align:center;
      height: 180px;    
      padding: 0;               
    }

    .brand{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Horizontal row that contains left loader, text, right loader */
    .brand-row{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 110px;
      width: 100%;
    }

    /* Text block for page title and subtitle */
    .brand-text{
      flex: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Main title */
    .brand h1{
      margin: 0;
      font-size: clamp(48px, 6vw, 72px);
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1.05;
    }

    /* Subtitle */
    .brand p{
      margin: 10px 0 0;
      font-size: clamp(20px, 2.5vw, 30px);
      color: var(--muted);
      line-height: 1.4;
      white-space: nowrap;
    }

    /* --------------------------------------------------
       LOADER / RADAR DESIGN
       Decorative animated radar circles from Uiverse
    -------------------------------------------------- */
    .loader {
      position: relative;
      width: 110px;
      height: 110px;
      background: transparent;
      border-radius: 50%;
      box-shadow: 25px 25px 75px rgba(0,0,0,0.55);
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      margin: 0 10px;
    }

    /* Outer dashed ring */
    .loader::before {
      content: '';
      position: absolute;
      inset: 20px;
      background: transparent;
      border: 1px dashed #444;
      border-radius: 50%;
      box-shadow: inset -5px -5px 25px rgba(0,0,0,0.25),
      inset 5px 5px 35px rgba(0,0,0,0.25);
    }

    /* Inner dashed ring */
    .loader::after {
      content: '';
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px dashed #444;
      box-shadow: inset -5px -5px 25px rgba(0,0,0,0.25),
      inset 5px 5px 35px rgba(0,0,0,0.25);
    }

    /* Rotating radar sweep arm */
    .loader span {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50%;
      height: 100%;
      background: transparent;
      transform-origin: top left;
      animation: radar81 2s linear infinite;
      border-top: 1px dashed #fff;
    }

    /* Glowing radar beam effect */
    .loader span::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: seagreen;
      transform-origin: top left;
      transform: rotate(-55deg);
      filter: blur(30px) drop-shadow(20px 20px 20px seagreen);
    }

    /* Rotation animation for radar sweep */
    @keyframes radar81 {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Horizontal divider line under header */
    .divider{
      height: 1px;
      background: rgba(255,255,255,0.10);
      margin: 26px 0;
    }

    /* Main dashboard layout: map left, status cards right */
    .grid{
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 16px;
    }

    /* --------------------------------------------------
       TABLET / SMALL SCREEN ADJUSTMENTS
    -------------------------------------------------- */
    @media (max-width: 768px){
      .grid{ grid-template-columns: 1fr; }

      .brand-row{
        gap: 14px;
      }

      /* Hide decorative radar loaders on smaller screens */
      .loader{
        display: none;
        width: 80px;
        height: 80px;
      }

      .loader::before{
        inset: 14px;
      }

      .loader::after{
        width: 34px;
        height: 34px;
      }
    }

    /* Stack brand content vertically on very small screens */
    @media (max-width: 650px){
      .brand-row{
        flex-direction: column;
      }
    }

    /* Map card container styling */
    .map-box{
      border-radius: 16px;
      border: 1px dashed rgba(0,204,255,0.30);
      background: rgba(0,204,255,0.06);
      min-height: 260px;
      display: block;
      overflow: hidden;
    }

    /* Actual map div */
    #map{
      width: 100%;
      min-height: 260px;
    }

    /* Custom map zoom button look */
    .leaflet-control-zoom a{
      background: rgba(15,17,23,0.85);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .leaflet-control-zoom a:hover{
      background: rgba(15,17,23,0.95);
    }

    /* Latitude and longitude display boxes */
    .coords{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .coord{
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }

    .coord .label{
      font-size: 12px;
      color: var(--muted2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .coord .value{
      font-size: 18px;
      font-weight: 800;
    }

    /* Vertical stack for the right-side cards */
    .stack{
      display: grid;
      gap: 16px;
    }

    /* Big status message text */
    .big-status{
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    /* Normal data text block */
    .value-block{
      font-size: 15px;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }

    /* Muted helper text style */
    .muted{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    /* Top bar above the main header */
    .topbar{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
    }

    /* Network status text and dot layout */
    .net-status{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    /* Default status dot */
    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 16px rgba(255,255,255,0.10);
    }

    /* Green status dot */
    .dot.ok{
      background: rgba(0,255,21,0.80);
      box-shadow: 0 0 18px rgba(0,255,21,0.22);
    }

    /* Red status dot */
    .dot.bad{
      background: rgba(255,51,0,0.85);
      box-shadow: 0 0 18px rgba(255,51,0,0.22);
    }
  </style>
</head>

<body>

  <!-- Main application wrapper -->
  <div id="app">
    <div class="container">

      <!-- Outer card holding the entire dashboard -->
      <div class="card">

        <!-- Top connection status bar -->
        <div class="topbar">
          <div class="net-status">
            <span id="netDot" class="dot"></span>
            <span id="netText">Connecting…</span>
          </div>
          <span class="pill neutral mono" id="localUpdated">Last updated: —</span>
        </div>

        <!-- Page header with title and animated radar loaders -->
        <header>
          <div class="brand">
            <div class="brand-row">
              <div class="loader">
                <span></span>
              </div>

              <div class="brand-text">
                <h1>ProxiCap+</h1>
                <p>Live Caretaker Monitoring Page</p>
              </div>

              <div class="loader">
                <span></span>
              </div>
            </div>
          </div>
        </header>

        <!-- Divider line between header and dashboard -->
        <div class="divider"></div>

        <!-- Dashboard content -->
        <div id="dashboard" class="container" style="padding-top: 0;">
          <div class="grid">

            <!-- Left side: map and coordinate display -->
            <div class="card">
              <div class="card-header">
                <div class="card-title">Geolocation</div>
                <span class="pill neutral mono">MAP</span>
              </div>
              <div class="card-body">
                <div class="map-box">
                  <div id="map" aria-label="Map"></div>
                </div>

                <div class="coords">
                  <div class="coord">
                    <div class="label">Latitude</div>
                    <div class="value mono" id="latVal">—</div>
                  </div>
                  <div class="coord">
                    <div class="label">Longitude</div>
                    <div class="value mono" id="lonVal">—</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right side: status, address, and last fall time -->
            <div class="stack">

              <!-- Status card -->
              <div class="card">
                <div class="card-header">
                  <div class="card-title">Status</div>
                  <span id="statusPill" class="pill neutral">
                    <span>●</span> <span id="statusShort">Waiting…</span>
                  </span>
                </div>
                <div class="card-body">
                  <div class="big-status" id="statusText">Waiting for status…</div>
                </div>
              </div>

              <!-- Address card -->
              <div class="card">
                <div class="card-header">
                  <div class="card-title">Current Location</div>
                  <span class="pill neutral mono">ADD</span>
                </div>
                <div class="card-body">
                  <div class="value-block" id="addressText">Waiting for address…</div>
                </div>
              </div>

              <!-- Last fall time card -->
              <div class="card">
                <div class="card-header">
                  <div class="card-title">Last Fall Detected</div>
                  <span class="pill neutral mono">H:M:S</span>
                </div>
                <div class="card-body">
                  <div class="value-block mono" id="timeText">Waiting for time…</div>
                </div>
              </div>

            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script>
    /* --------------------------------------------------
       CONFIGURATION
       ENDPOINT = your Netlify backend URL
       POLL_MS = how often the page requests new data
    -------------------------------------------------- */
    const ENDPOINT = "https://funny-kelpie-034c79.netlify.app/.netlify/functions/update";
    const POLL_MS = 3000;

    /* --------------------------------------------------
       ELEMENT REFERENCES
       These connect JavaScript variables to HTML elements
       so they can be updated later.
    -------------------------------------------------- */
    const netDot = document.getElementById("netDot");
    const netText = document.getElementById("netText");
    const localUpdated = document.getElementById("localUpdated");

    const latVal = document.getElementById("latVal");
    const lonVal = document.getElementById("lonVal");
    const statusText = document.getElementById("statusText");
    const statusShort = document.getElementById("statusShort");
    const statusPill = document.getElementById("statusPill");
    const addressText = document.getElementById("addressText");
    const timeText = document.getElementById("timeText");

    /* --------------------------------------------------
       MAP VARIABLES
       map = Leaflet map object
       marker = marker placed on the map
    -------------------------------------------------- */
    let map = null;
    let marker = null;

    /* --------------------------------------------------
       initMap()
       Creates the Leaflet map with a default location.
       This default point is used until real device data arrives.
    -------------------------------------------------- */
    function initMap() {
      const defaultLat = 53.5444;
      const defaultLon = -113.4909;

      map = L.map("map", {
        zoomControl: true,
        attributionControl: true
      }).setView([defaultLat, defaultLon], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      marker = L.marker([defaultLat, defaultLon]).addTo(map);
      marker.bindPopup("ProxiCap+ location").openPopup();
    }

    /* --------------------------------------------------
       updateMap(lat, lon, popupText)
       Updates marker position and recenters the map.
       Only runs if map and marker already exist.
    -------------------------------------------------- */
    function updateMap(lat, lon, popupText) {
      if (!map || !marker) return;

      const latNum = Number(lat);
      const lonNum = Number(lon);

      /* Ignore bad coordinate values */
      if (!Number.isFinite(latNum) || !Number.isFinite(lonNum)) return;

      const newPos = [latNum, lonNum];
      marker.setLatLng(newPos);

      /* Update popup text if one was provided */
      if (popupText) marker.setPopupContent(popupText);

      /* Recenter map on new coordinates */
      map.setView(newPos, map.getZoom(), { animate: true });
    }

    /* --------------------------------------------------
       setNet(state, message)
       Updates the connection status dot and text.
       state can be: "ok", "bad", or neutral if neither is added
    -------------------------------------------------- */
    function setNet(state, message){
      netDot.classList.remove("ok", "bad");
      if(state === "ok") netDot.classList.add("ok");
      if(state === "bad") netDot.classList.add("bad");
      netText.textContent = message;
    }

    /* --------------------------------------------------
       looksLikeFall(statusStr)
       Checks the status text and decides if it sounds like
       a fall/emergency condition.
       Returns true if it finds matching words.
    -------------------------------------------------- */
    function looksLikeFall(statusStr){
      const s = String(statusStr || "").toLowerCase();
      return s.includes("fall") || s.includes("detected") || s.includes("alert") || s.includes("emergency");
    }

    /* --------------------------------------------------
       setStatusUI(statusStr)
       Updates the status card based on the incoming status text.
       - Neutral if waiting
       - Red if fall/emergency detected
       - Green if normal
    -------------------------------------------------- */
    function setStatusUI(statusStr){
      const fall = looksLikeFall(statusStr);
      statusPill.classList.remove("ok", "bad", "neutral");

      if (!statusStr || statusStr === "Waiting…") {
        statusPill.classList.add("neutral");
        statusShort.textContent = "Waiting…";
        statusText.textContent = "Waiting for status…";
        return;
      }

      if (fall){
        statusPill.classList.add("bad");
        statusShort.textContent = "FALL";
        statusText.textContent = String(statusStr);
      } else {
        statusPill.classList.add("ok");
        statusShort.textContent = "OK";
        statusText.textContent = String(statusStr);
      }
    }

    /* --------------------------------------------------
       setLastUpdatedNow()
       Shows the current local date/time in the top bar.
       This tells the viewer when the page was last refreshed
       with data from the backend.
    -------------------------------------------------- */
    function setLastUpdatedNow(){
      const t = new Date().toLocaleString();
      localUpdated.textContent = "Last updated: " + t;
    }

    /* --------------------------------------------------
       setPlaceholdersWaiting()
       Resets displayed values to waiting/default state.
       Used when no valid data is available yet.
    -------------------------------------------------- */
    function setPlaceholdersWaiting(){
      latVal.textContent = "—";
      lonVal.textContent = "—";
      addressText.textContent = "Waiting for address…";
      timeText.textContent = "Waiting for time…";
      setStatusUI("Waiting…");
    }

    /* --------------------------------------------------
       fetchData()
       Gets the latest JSON data from the Netlify backend.
       Then updates:
       - network status
       - coordinates
       - address
       - last fall time
       - status card
       - map marker location
    -------------------------------------------------- */
    async function fetchData(){
      try{
        /* Send request to backend */
        const res = await fetch(ENDPOINT);

        /* Convert response into JavaScript object */
        const data = await res.json();

        /* If backend returned empty data, show waiting state */
        if (!data || Object.keys(data).length === 0){
          setNet("bad", "No data yet");
          setPlaceholdersWaiting();
          return;
        }

        /* Backend responded successfully */
        setNet("ok", "Online");

        /* Update visible data fields */
        latVal.textContent = (data.lat ?? "—");
        lonVal.textContent = (data.lon ?? "—");
        addressText.textContent = (data.address ?? "—");
        timeText.textContent = (data.lastFallTime ?? "—");
        setStatusUI(data.status ?? "—");

        /* Update local timestamp display */
        setLastUpdatedNow();

        /* Text shown when marker popup is opened */
        const popup = `ProxiCap+<br>${data.address ?? ""}<br>${data.lastFallTime ?? ""}<br>(${data.lat ?? "—"}, ${data.lon ?? "—"})`;

        /* Move map marker to latest coordinates */
        updateMap(data.lat, data.lon, popup);

      } catch(err){
        /* If request fails, show connection error */
        setNet("bad", "Error fetching data");
      }
    }

    /* --------------------------------------------------
       POLLING
       Calls fetchData every 3 seconds so the dashboard keeps
       updating automatically.
    -------------------------------------------------- */
    setInterval(fetchData, POLL_MS);

    /* Run once immediately so page does not wait 3 seconds */
    fetchData();

    /* --------------------------------------------------
       MAP INITIALIZATION ON PAGE LOAD
       Wait until the page and Leaflet are loaded before
       building the map.
    -------------------------------------------------- */
    window.addEventListener("load", () => {
      if (window.L) {
        initMap();

        /* Helps Leaflet render correctly after page load */
        if (map) map.invalidateSize();
      }
    });
  </script>
</body>
</html>
