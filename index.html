<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProxiCap+ Dashboard</title>

<!-- Leaflet (Map) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

<style>
:root{
  --bg:#0f1117;
  --panel:rgba(255,255,255,0.06);
  --panel-2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.10);
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.65);
  --muted2:rgba(255,255,255,0.45);
  --ok:#00ff15;
  --warn:#ffea00;
  --bad:#ff3300;
  --accent:#00ccff;
  --shadow:0 12px 30px rgba(0,0,0,0.40);
  --radius:18px;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
  margin:0;
  font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(1200px 700px at 20% 10%, rgba(0,204,255,0.14), transparent 55%),
    radial-gradient(900px 600px at 80% 20%, rgba(0,255,21,0.10), transparent 60%),
    var(--bg);
  color:var(--text);
}

.container{
  width:min(1100px,92vw);
  margin:0 auto;
  padding:28px 0 60px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter:blur(10px);
}

/* --- rest of your CSS remains EXACT, just formatted --- */
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div id="loadingInner">
    <h1 id="loadingTitle">ProxiCap+</h1>
    <p id="loadingSubtitle">Smart Monitoring System</p>
    <p id="loadingHint">Initializing dashboard…</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="container">

    <div class="card">
      <div class="topbar">
        <div class="net-status">
          <span id="netDot" class="dot"></span>
          <span id="netText">Connecting…</span>
        </div>
        <span class="pill neutral mono" id="localUpdated">Last updated: —</span>
      </div>

      <header>
        <div class="brand">
          <h1>ProxiCap+</h1>
          <p>Live Caretaker Monitoring Page</p>
        </div>
      </header>

      <div id="map"></div>

      <p>Lat: <span id="latVal">—</span></p>
      <p>Lon: <span id="lonVal">—</span></p>
      <p>Status: <span id="statusText">Waiting…</span></p>
      <p>Address: <span id="addressText">Waiting…</span></p>
      <p>Time: <span id="timeText">Waiting…</span></p>

      <pre id="rawJson">Waiting for data…</pre>

    </div>

  </div>
</div>

<script>
const ENDPOINT = "https://funny-kelpie-034c79.netlify.app/.netlify/functions/update";
const POLL_MS = 3000;
const LOADING_MS = 5000;

const latVal = document.getElementById("latVal");
const lonVal = document.getElementById("lonVal");
const statusText = document.getElementById("statusText");
const addressText = document.getElementById("addressText");
const timeText = document.getElementById("timeText");
const rawJson = document.getElementById("rawJson");

let map = null;
let marker = null;

function initMap(){
  const defaultLat = 53.5444;
  const defaultLon = -113.4909;

  map = L.map("map").setView([defaultLat, defaultLon], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  marker = L.marker([defaultLat, defaultLon]).addTo(map);
}

function updateMap(lat, lon, popupText){
  if (!map || !marker) return;

  const pos = [Number(lat), Number(lon)];
  marker.setLatLng(pos);

  if (popupText) marker.bindPopup(popupText);
  map.setView(pos);
}

async function fetchData(){
  try{
    const res = await fetch(ENDPOINT);
    const data = await res.json();

    latVal.textContent = data.lat ?? "—";
    lonVal.textContent = data.lon ?? "—";
    addressText.textContent = data.address ?? "—";
    timeText.textContent = data.time ?? "—";
    statusText.textContent = data.status ?? "—";

    rawJson.textContent = JSON.stringify(data, null, 2);

    const popup = `ProxiCap+<br>${data.address ?? ""}<br>${data.time ?? ""}<br>(${data.lat ?? "—"}, ${data.lon ?? "—"})`;

    updateMap(data.lat, data.lon, popup);

  } catch(err){
    rawJson.textContent = "Error fetching data";
  }
}

setInterval(fetchData, POLL_MS);
fetchData();

window.addEventListener("load", () => {
  if (window.L) initMap();
});

setTimeout(() => {
  document.getElementById("app").style.display = "block";
  document.getElementById("loadingScreen").remove();
}, LOADING_MS);
</script>

</body>
</html>
